apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - chart: dex
      repoURL: https://charts.dexidp.io
      targetRevision: 0.x.*
      helm:
        values: |
          podAnnotations:
            reloader.stakater.com/auto: "true"

          replicaCount: 3

          podDisruptionBudget:
            enabled: true
            minAvailable: 1

          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: dex
                    topologyKey: kubernetes.io/hostname

          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: dex

          envFrom:
            - secretRef:
                name: dex-secrets

          config:
            issuer: https://sso.levizitting.com

            storage:
              type: kubernetes
              config:
                inCluster: true

            web:
              http: 0.0.0.0:5556

            connectors:
              - type: github
                id: github
                name: GitHub
                config:
                  clientID: "Ov23li3AFGEhcY4iyMzt"
                  clientSecret: "${githubClientSecret}"
                  redirectURI: https://sso.levizitting.com/callback
                  useLoginAsID: true

            staticClients:
              - id: argocd
                name: ArgoCD
                secretEnv: argocdClientSecret
                redirectURIs:
                  - https://argocd.levizitting.com/auth/callback
              - id: grafana
                name: Grafana
                secretEnv: grafanaClientSecret
                redirectURIs:
                  - https://grafana.levizitting.com/login/generic_oauth
              - id: oauth2-proxy
                name: oauth2-proxy
                secretEnv: oauth2ProxyClientSecret
                redirectURIs:
                  - https://auth.levizitting.com/oauth2/callback
              - id: openbao
                name: OpenBao
                secretEnv: openbaoClientSecret
                redirectURIs:
                  - https://secrets.levizitting.com/ui/vault/auth/oidc/oidc/callback
                  - https://secrets.levizitting.com/auth/oidc/callback

            oauth2:
              skipApproval: true
              alwaysShowLoginScreen: false

          service:
            port: 5556

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
    - repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
      path: src/k8s/dex
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: dex
  ignoreDifferences:
    - group: cert-manager.io
      kind: Certificate
      jsonPointers:
        - /spec/duration
        - /spec/renewBefore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
