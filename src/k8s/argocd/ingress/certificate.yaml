apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-headnet-tls
  namespace: argocd
spec:
  secretName: argocd-headnet-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: headnet-ca
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - argocd.headnet.levizitting.com
