apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - chart: openbao
      repoURL: https://openbao.github.io/openbao-helm
      targetRevision: 0.27.*
      helm:
        values: |
          injector:
            enabled: false
          csi:
            enabled: false
          server:
            updateStrategyType: RollingUpdate
            ha:
              enabled: true
              replicas: 3
              raft:
                enabled: true
                config: |
                  ui = true

                  listener "tcp" {
                    tls_disable = 1
                    address = "[::]:8200"
                    cluster_address = "[::]:8201"
                  }

                  storage "raft" {
                    path = "/openbao/data"
                    retry_join {
                      leader_api_addr = "http://openbao-0.openbao-internal:8200"
                    }
                    retry_join {
                      leader_api_addr = "http://openbao-1.openbao-internal:8200"
                    }
                    retry_join {
                      leader_api_addr = "http://openbao-2.openbao-internal:8200"
                    }
                  }

                  service_registration "kubernetes" {}

                  seal "static" {
                    current_key_id = "openbao-unseal-v1"
                    current_key    = "file:///openbao/seals/current.key"
                  }
            dataStorage:
              enabled: true
              size: 10Gi
            volumes:
              - name: levizitting-ca-bundle
                configMap:
                  name: levizitting-ca-bundle
              - name: openbao-seal
                emptyDir:
                  medium: Memory
            volumeMounts:
              - name: levizitting-ca-bundle
                mountPath: /etc/ssl/certs/levizitting-ca.crt
                subPath: ca.crt
                readOnly: true
              - name: openbao-seal
                mountPath: /openbao/seals
                readOnly: true
            extraInitContainers:
              - name: fetch-unseal-key
                image: amazon/aws-cli:2.35.12
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -euo pipefail
                    echo "fetch-unseal-key: requesting unseal key from SSM..."
                    aws ssm get-parameter \
                      --with-decryption \
                      --name /vm-workloads/lz/infra-vm-workloads/openbao-unseal-key \
                      --query Parameter.Value \
                      --output text \
                      | tr -d '\n' > /openbao/seals/current.key
                    key_byte_count=$(wc -c < /openbao/seals/current.key)
                    echo "fetch-unseal-key: wrote ${key_byte_count} bytes to /openbao/seals/current.key"
                    if [ "${key_byte_count}" -ne 44 ]; then
                      echo "fetch-unseal-key: ERROR expected 44-byte base64 key, got ${key_byte_count}" >&2
                      exit 1
                    fi
                    echo "fetch-unseal-key: done"
                env:
                  - name: AWS_REGION
                    value: us-east-2
                  - name: AWS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: external-secrets-aws-creds
                        key: access_key_id
                  - name: AWS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: external-secrets-aws-creds
                        key: secret_access_key
                volumeMounts:
                  - name: openbao-seal
                    mountPath: /openbao/seals
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 250m
                    memory: 128Mi
            extraEnvironmentVars:
              SSL_CERT_DIR: /etc/ssl/certs
              BAO_LOG_FORMAT: json
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
    - repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
      path: src/k8s/openbao
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  ignoreDifferences:
    - group: cert-manager.io
      kind: Certificate
      jsonPointers:
        - /spec/duration
        - /spec/renewBefore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
