apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
        revision: main
        directories:
          - path: src/k8s/apps/*
  template:
    metadata:
      name: '{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
        path: '{{path}}'
        targetRevision: main
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true