apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    chart: infisical-standalone
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts
    targetRevision: 1.9.0
    helm:
      values: |
        infisical:
          fullnameOverride: infisical
          replicaCount: 2
          kubeSecretRef: infisical-server-env
          extraEnv:
            - name: DB_CONNECTION_URI
              valueFrom:
                secretKeyRef:
                  name: infisical-db-app
                  key: uri
        postgresql:
          enabled: false
        redis:
          enabled: false
        ingress:
          enabled: false
          nginx:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
