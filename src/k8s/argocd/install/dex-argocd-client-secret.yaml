apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-argocd-client-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: oidc.argocd.clientSecret
      remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/dex-client-argocd-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
