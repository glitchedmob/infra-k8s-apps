apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-tls
  namespace: openbao
spec:
  secretName: openbao-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: levizitting-ca
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - secrets.levizitting.com
