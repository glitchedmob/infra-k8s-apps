apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-service
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - test-service.levizitting.com
      secretName: test-service-levizitting-com-tls
  rules:
    - host: test-service.levizitting.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-service
                port:
                  number: 80
