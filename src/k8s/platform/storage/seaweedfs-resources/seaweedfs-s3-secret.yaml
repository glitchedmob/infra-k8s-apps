apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-seaweedfs-reader
  namespace: seaweedfs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-seaweedfs-reader
  namespace: seaweedfs
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-seaweedfs-reader
  namespace: seaweedfs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-seaweedfs-reader
subjects:
  - kind: ServiceAccount
    name: eso-seaweedfs-reader
    namespace: seaweedfs
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: seaweedfs-k8s
  namespace: seaweedfs
spec:
  provider:
    kubernetes:
      remoteNamespace: seaweedfs
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-seaweedfs-reader
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
  namespace: seaweedfs
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: seaweedfs-k8s
  target:
    name: seaweedfs-s3-config
    template:
      engineVersion: v2
      data:
        seaweedfs_s3_config: |
          {
            "identities": [
              {
                "name": "anvAdmin",
                "credentials": [
                  {
                    "accessKey": "{{ .adminAccessKey }}",
                    "secretKey": "{{ .adminSecretKey }}"
                  }
                ],
                "actions": ["Admin", "Read", "Write"]
              },
              {
                "name": "anvObservability",
                "credentials": [
                  {
                    "accessKey": "{{ .obsAccessKey }}",
                    "secretKey": "{{ .obsSecretKey }}"
                  }
                ],
                "actions": ["Read", "Write", "List", "Tagging"],
                "resources": [
                  "arn:seaweedfs:::loki-chunks/*",
                  "arn:seaweedfs:::loki-ruler/*",
                  "arn:seaweedfs:::loki-admin/*",
                  "arn:seaweedfs:::tempo-traces/*",
                  "arn:seaweedfs:::thanos-metrics/*"
                ]
              }
            ]
          }
  data:
    - secretKey: adminAccessKey
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: seaweedfs-s3-admin
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: access_key
    - secretKey: adminSecretKey
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: seaweedfs-s3-admin
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: secret_key
    - secretKey: obsAccessKey
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: seaweedfs-s3-observability
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: access_key
    - secretKey: obsSecretKey
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: seaweedfs-s3-observability
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: secret_key
