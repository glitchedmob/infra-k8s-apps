apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs-filer-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
    path: src/k8s/platform/storage/seaweedfs-filer-ingress
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: cert-manager.io
      kind: Certificate
      jsonPointers:
        - /spec/duration
        - /spec/renewBefore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
