apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  source:
    chart: tempo
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 2.2.*
    helm:
      values: |
        replicas: 1
        tempo:
          reportingEnabled: false
          retention: 168h
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 1Gi
          extraEnvFrom:
            - secretRef:
                name: seaweedfs-s3-observability
          livenessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
        persistence:
          enabled: true
          size: 2Gi
          storageClassName: longhorn
        config: |
          stream_over_http_enabled: true
          server:
            http_listen_port: 3200
            log_level: info
          distributor:
            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: "0.0.0.0:4317"
                  http:
                    endpoint: "0.0.0.0:4318"
          ingester:
            max_block_duration: 5m
          compactor:
            compaction:
              block_retention: 168h
          query_frontend:
            metrics:
              max_duration: 168h
          storage:
            trace:
              backend: s3
              s3:
                bucket: tempo-traces
                endpoint: seaweedfs-s3.seaweedfs.svc.cluster.local:8333
                region: us-east-1
                insecure: true
                forcepathstyle: true
              wal:
                path: /var/tempo/wal
          metrics_generator:
            registry:
              external_labels:
                source: tempo
                cluster: homelab
            storage:
              path: /var/tempo/generator/wal
              remote_write:
                - url: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"
                  send_exemplars: true
            traces_storage:
              path: /var/tempo/generator/traces
          overrides:
            defaults:
              metrics_generator:
                processors:
                  - span-metrics
                  - service-graphs
                  - local-blocks
          usage_report:
            reporting_enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
