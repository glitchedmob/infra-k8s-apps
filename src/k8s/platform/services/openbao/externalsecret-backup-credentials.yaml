apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-backup-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: k8up-b2-credentials
    creationPolicy: Owner
  data:
    - secretKey: account-id
      remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/backups/b2-account-id
    - secretKey: account-key
      remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/backups/b2-account-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-k8up-repo-password
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: openbao-k8up-repo-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/backups/openbao/restic-password
