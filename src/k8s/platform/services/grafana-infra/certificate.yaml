apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: grafana-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: levizitting-ca
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
  dnsNames:
    - grafana.levizitting.com
