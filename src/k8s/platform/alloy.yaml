apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  sources:
    - chart: alloy
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.10.1
      helm:
        values: |
          alloy:
            clustering:
              enabled: false
            enableReporting: false
            storagePath: /var/lib/alloy
            configMap:
              create: false
              name: alloy-config
              key: config.alloy
            mounts:
              varlog: true
              extra:
                - name: alloy-storage
                  mountPath: /var/lib/alloy
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

          controller:
            type: daemonset
            tolerations:
              - operator: Exists
            volumes:
              extra:
                - name: alloy-storage
                  hostPath:
                    path: /var/lib/alloy
                    type: DirectoryOrCreate

          serviceMonitor:
            enabled: true
            additionalLabels:
              release: kube-prometheus-stack
    - repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
      path: src/k8s/platform/observability/alloy-config
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
