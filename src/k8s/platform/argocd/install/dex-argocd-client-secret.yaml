apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-argocd-client-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: argocd-k8s
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: oidc.argocd.clientSecret
      remoteRef:
        key: argocd-secrets
        property: argocdClientSecret
