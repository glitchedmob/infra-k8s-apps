apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.5/manifests/ha/install.yaml
  - dex-argocd-client-secret.yaml

patches:
  - path: patches/argocd-cm.yaml
  - path: patches/argocd-cmd-params-cm.yaml
  - path: patches/argocd-application-controller-sts.yaml
  - path: patches/argocd-rbac-cm.yaml
  - path: patches/argocd-server-deploy.yaml
