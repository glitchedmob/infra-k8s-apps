apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/ha/install.yaml
  - dex-argocd-client-secret.yaml

patchesStrategicMerge:
  - patches/argocd-cm.yaml
  - patches/argocd-cmd-params-cm.yaml
  - patches/argocd-rbac-cm.yaml
  - patches/argocd-server-deploy.yaml
