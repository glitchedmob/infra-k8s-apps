apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-observability-reader
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-observability-reader
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-observability-reader
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-observability-reader
subjects:
  - kind: ServiceAccount
    name: eso-observability-reader
    namespace: observability
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: observability-k8s
  namespace: observability
spec:
  provider:
    kubernetes:
      remoteNamespace: observability
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-observability-reader
