apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: argocd-k8s
spec:
  provider:
    kubernetes:
      remoteNamespace: external-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: eso-argocd-reader
          namespace: external-secrets
  conditions:
    - namespaces:
        - argocd
---
