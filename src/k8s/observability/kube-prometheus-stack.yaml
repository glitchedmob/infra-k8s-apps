apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 75.6.*
      helm:
        values: |
          alertmanager:
            enabled: false

          defaultRules:
            create: true

          kubeStateMetrics:
            enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

          nodeExporter:
            enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

          prometheusOperator:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi

          prometheus:
            prometheusSpec:
              enableRemoteWriteReceiver: true
              replicas: 2
              podAntiAffinity: "hard"
              externalLabels:
                cluster: lz
              retention: 6h
              retentionSize: 15GB
              disableCompaction: true
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 20Gi
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi
              thanos:
                objectStorageConfig:
                  existingSecret:
                    name: thanos-objstore-config
                    key: objstore.yml
            service:
              type: NodePort
              nodePort: 30909
            thanosService:
              enabled: true
            thanosServiceMonitor:
              enabled: true

          grafana:
            enabled: true
            replicas: 2
            dashboardProviders:
              dashboardproviders.yaml:
                apiVersion: 1
                providers:
                  - name: 'default'
                    orgId: 1
                    folder: ''
                    type: file
                    disableDeletion: false
                    allowUiUpdates: false
                    updateIntervalSeconds: 30
                    options:
                      foldersFromFilesStructure: false
                      path: /var/lib/grafana/dashboards/default
            dashboards:
              default:
                proxmox-ve:
                  gnetId: 23855
                  revision: 1
                  datasource:
                    - name: DS_PROMETHEUS
                      value: prometheus
                    - name: dsProxmox
                      value: prometheus
            podAnnotations:
              reloader.stakater.com/auto: "true"
            podDisruptionBudget:
              minAvailable: 1
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: grafana
            sidecar:
              datasources:
                url: http://thanos-querier.monitoring.svc.cluster.local:10902
            "grafana.ini":
              database:
                type: postgres
                host: grafana-db-rw.monitoring.svc.cluster.local:5432
                name: grafana
                user: grafana
                password: $__file{/etc/secrets/grafana-db/password}
                ssl_mode: disable
              server:
                domain: grafana.levizitting.com
                root_url: https://grafana.levizitting.com
              auth.generic_oauth:
                enabled: true
                name: Dex
                client_id: grafana
                client_secret: ${GF_OAUTH_CLIENT_SECRET}
                auth_url: https://sso.levizitting.com/auth
                token_url: http://dex.dex.svc.cluster.local:5556/token
                api_url: http://dex.dex.svc.cluster.local:5556/userinfo
                scopes: openid profile email
                allowed_users: me@levizitting.com
                auto_assign_org: true
                auto_assign_org_role: Admin
                role_attribute_path: "[email=='me@levizitting.com'][0] && 'Admin' || 'Viewer'"
                use_pkce: true
            envFromSecret: dex-grafana-client-secret
            extraSecretMounts:
              - name: grafana-db
                secretName: grafana-db-app
                mountPath: /etc/secrets/grafana-db
                readOnly: true
            persistence:
              enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            additionalDataSources:
              - name: Loki
                type: loki
                url: http://loki-gateway.monitoring.svc.cluster.local:80
                access: proxy
                editable: false
              - name: Tempo
                type: tempo
                url: http://tempo.monitoring.svc.cluster.local:3200
                access: proxy
                editable: false
    - repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
      path: src/k8s/observability/thanos
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
