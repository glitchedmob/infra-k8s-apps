apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 75.6.*
      helm:
        values: |
          alertmanager:
            enabled: false

          defaultRules:
            create: false

          kubeStateMetrics:
            enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

          nodeExporter:
            enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

          prometheusOperator:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi

          prometheus:
            prometheusSpec:
              enableRemoteWriteReceiver: true
              replicas: 2
              podAntiAffinity: "hard"
              externalLabels:
                cluster: lz
              retention: 6h
              retentionSize: 15GB
              disableCompaction: true
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 20Gi
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi
              thanos:
                objectStorageConfig:
                  existingSecret:
                    name: thanos-objstore-config
                    key: objstore.yml
            service:
              type: NodePort
              nodePort: 30909
            thanosService:
              enabled: true
            thanosServiceMonitor:
              enabled: true

          grafana:
            enabled: true
            replicas: 2
            podDisruptionBudget:
              minAvailable: 1
            sidecar:
              datasources:
                url: http://thanos-querier.monitoring.svc.cluster.local:10902
            "grafana.ini":
              database:
                type: postgres
                host: grafana-db-rw.monitoring.svc.cluster.local:5432
                name: grafana
                user: grafana
                password: $__file{/etc/secrets/grafana-db/password}
                ssl_mode: disable
              server:
                domain: grafana.levizitting.com
                root_url: https://grafana.levizitting.com
              auth.github:
                enabled: true
                client_id: ${GF_AUTH_GITHUB_CLIENT_ID}
                client_secret: ${GF_AUTH_GITHUB_CLIENT_SECRET}
                allowed_users: glitchedmob
                auto_assign_org: true
                auto_assign_org_role: Admin
                role_attribute_path: "[login=='glitchedmob'][0] && 'Admin' || 'Viewer'"
            envFromSecret: grafana-github-oauth
            extraSecretMounts:
              - name: grafana-db
                secretName: grafana-db-app
                mountPath: /etc/secrets/grafana-db
                readOnly: true
            persistence:
              enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            additionalDataSources:
              - name: Loki
                type: loki
                url: http://loki-gateway.monitoring.svc.cluster.local:80
                access: proxy
                editable: false
              - name: Tempo
                type: tempo
                url: http://tempo.monitoring.svc.cluster.local:3100
                access: proxy
                editable: false
    - repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
      path: src/k8s/observability/thanos
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
