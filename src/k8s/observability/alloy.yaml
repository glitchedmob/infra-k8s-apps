apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    chart: alloy
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.*
    helm:
      values: |
        alloy:
          clustering:
            enabled: true
          enableReporting: false
          configMap:
            create: false
            name: alloy-config
            key: config.alloy
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        configReloader:
          customArgs:
            - --watched-dir=/etc/alloy
            - --reload-url=http://localhost:12345/api/v1/restart

        controller:
          tolerations:
            - operator: Exists

        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
