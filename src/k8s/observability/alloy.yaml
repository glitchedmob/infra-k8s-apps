apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    chart: alloy
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.*
    helm:
      values: |
        alloy:
          clustering:
            enabled: true
          enableReporting: false
          configMap:
            content: |-
              logging {
                level  = "info"
                format = "logfmt"
              }

              discovery.kubernetes "pods" {
                role = "pod"
              }

              discovery.relabel "pod_metadata" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app"]
                  target_label  = "app"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_service"]
                  target_label  = "service"
                }
              }

              loki.process "parse_logs" {
                stage.cri {}

                stage.json {
                  source = "content"
                  expressions = {
                    level   = "level",
                    service = "service",
                  }
                }

                stage.labels {
                  values = {
                    level   = "",
                    service = "",
                  }
                }

                stage.match {
                  selector = "{namespace=\"openbao\"}"
                  stage.json {
                    source = "content"
                    expressions = {
                      bao_level = "@level",
                    }
                  }
                  stage.labels {
                    values = {
                      level = "bao_level",
                    }
                  }
                }

                stage.match {
                  selector = "{namespace=\"seaweedfs\"}|~\"^I[0-9]{4} \""
                  stage.static_labels {
                    values = {
                      level = "info",
                    }
                  }
                }

                stage.match {
                  selector = "{namespace=\"seaweedfs\"}|~\"^W[0-9]{4} \""
                  stage.static_labels {
                    values = {
                      level = "warn",
                    }
                  }
                }

                stage.match {
                  selector = "{namespace=\"seaweedfs\"}|~\"^E[0-9]{4} \""
                  stage.static_labels {
                    values = {
                      level = "error",
                    }
                  }
                }

                stage.match {
                  selector = "{namespace=\"seaweedfs\"}|~\"^F[0-9]{4} \""
                  stage.static_labels {
                    values = {
                      level = "fatal",
                    }
                  }
                }

                stage.output {
                  source = "content"
                }

                forward_to = [loki.write.loki.receiver]
              }

              loki.source.kubernetes "pod_logs" {
                targets    = discovery.relabel.pod_metadata.output
                forward_to = [loki.process.parse_logs.receiver]

                clustering {
                  enabled = true
                }
              }

              loki.write "loki" {
                endpoint {
                  url = "http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push"
                }
              }
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        controller:
          tolerations:
            - operator: Exists

        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
