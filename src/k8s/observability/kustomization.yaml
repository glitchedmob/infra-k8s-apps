apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: alloy-config
    namespace: monitoring
    files:
      - config.alloy
resources:
  - kube-prometheus-stack.yaml
  - loki.yaml
  - tempo.yaml
  - otel-operator.yaml
  - alloy.yaml
