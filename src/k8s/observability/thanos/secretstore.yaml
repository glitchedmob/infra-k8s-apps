apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-monitoring-reader
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-monitoring-reader
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-monitoring-reader
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-monitoring-reader
subjects:
  - kind: ServiceAccount
    name: eso-monitoring-reader
    namespace: monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: eso-monitoring-reader-token
  namespace: monitoring
  annotations:
    kubernetes.io/service-account.name: eso-monitoring-reader
type: kubernetes.io/service-account-token
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: monitoring-k8s
  namespace: monitoring
spec:
  provider:
    kubernetes:
      remoteNamespace: monitoring
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        token:
          bearerToken:
            name: eso-monitoring-reader-token
            key: token
