apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    chart: loki
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 18.1.*
    helm:
      values: |
        deploymentMode: Monolithic
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 3
          schemaConfig:
            configs:
              - from: "2026-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: seaweedfs-s3.seaweedfs.svc.cluster.local:8333
              region: us-east-1
              insecure: true
              s3ForcePathStyle: true
          storage_config:
            aws:
              s3forcepathstyle: true
        defaults:
          extraEnvFrom:
            - secretRef:
                name: seaweedfs-s3-observability
        singleBinary:
          replicas: 3
          persistence:
            size: 5Gi
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomPlanner:
          replicas: 0
        bloomBuilder:
          replicas: 0
        bloomGateway:
          replicas: 0
        gateway:
          service:
            type: NodePort
            nodePort: 31001
        lokiCanary:
          extraArgs:
            - -labels=pod=$(POD_NAME),service=loki-canary
          podLabels:
            service: loki-canary
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
