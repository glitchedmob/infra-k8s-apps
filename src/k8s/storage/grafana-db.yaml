apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-db
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: default
  source:
    repoURL: ssh://git@github.com/glitchedmob/infra-k8s-apps.git
    targetRevision: main
    path: src/k8s/storage/grafana-db
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
