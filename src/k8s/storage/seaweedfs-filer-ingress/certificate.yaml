apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: seaweedfs-filer-tls
  namespace: seaweedfs
spec:
  secretName: seaweedfs-filer-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: levizitting-ca
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
  dnsNames:
    - seaweedfs.levizitting.com
