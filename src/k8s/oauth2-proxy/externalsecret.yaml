apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-oauth2-proxy-secrets
  namespace: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: dex-oauth2-proxy-secrets
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/dex-client-oauth2-proxy-secret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/oauth2-proxy-cookie-secret
