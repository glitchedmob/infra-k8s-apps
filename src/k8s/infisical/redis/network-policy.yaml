apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: infisical-redis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dragonfly
      dragonfly.dragonflydb.io/name: infisical-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infisical
      ports:
        - port: 6379
          protocol: TCP
