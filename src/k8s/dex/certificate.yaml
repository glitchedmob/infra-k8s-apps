apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dex-tls
  namespace: dex
spec:
  secretName: dex-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: levizitting-ca
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
  dnsNames:
    - sso.levizitting.com
