apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: valkey-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    chart: valkey-operator
    repoURL: https://keiailab.github.io/valkey-operator
    targetRevision: 1.3.2
    helm:
      values: |
        replicaCount: 1
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        metrics:
          serviceMonitor:
            enabled: true
        webhook:
          enabled: false
        features:
          cluster:
            enabled: false
          backup:
            enabled: false
          autoscaling:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: valkey-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
