apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    chart: longhorn
    repoURL: https://charts.longhorn.io
    targetRevision: 1.12.*
    helm:
      values: |
        preUpgradeChecker:
          jobEnabled: false
        persistence:
          defaultClass: false
          defaultClassReplicaCount: 3
        defaultSettings:
          defaultDataPath: /mnt/k8s-data/longhorn
        csi:
          snapshotterReplicaCount: "0"
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
