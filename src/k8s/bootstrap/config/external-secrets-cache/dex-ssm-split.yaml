apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-secrets
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: cache-k8s
  target:
    name: argocd-secrets
  data:
    - secretKey: argocdClientSecret
      remoteRef:
        key: ssm-cache
        property: argocdClientSecret
---
apiVersion: external-secrets.io/v1
