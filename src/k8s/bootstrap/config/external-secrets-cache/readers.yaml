apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-argocd-reader
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-argocd-reader
  namespace: external-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-argocd-reader
  namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-argocd-reader
subjects:
  - kind: ServiceAccount
    name: eso-argocd-reader
    namespace: external-secrets
---
apiVersion: v1
kind: Secret
metadata:
  name: eso-argocd-reader-token
  namespace: external-secrets
  annotations:
    kubernetes.io/service-account.name: eso-argocd-reader
type: kubernetes.io/service-account-token
