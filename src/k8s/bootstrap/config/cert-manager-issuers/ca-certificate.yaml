apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headnet-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: headnet.levizitting.com Root CA
  subject:
    organizations:
      - levizitting.com
  dnsNames:
    - headnet.levizitting.com
  secretName: headnet-root-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
