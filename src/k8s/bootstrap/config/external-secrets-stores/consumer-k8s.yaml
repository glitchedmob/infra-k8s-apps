apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: argocd-k8s
spec:
  provider:
    kubernetes:
      remoteNamespace: external-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        token:
          bearerToken:
            name: eso-argocd-reader-token
            namespace: external-secrets
            key: token
  conditions:
    - namespaces:
        - argocd
