apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-github-oauth
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: argocd-github-oauth
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/argocd-github-oauth-client-id
      secretKey: client-id
    - remoteRef:
        key: /vm-workloads/lz/infra-vm-workloads/argocd-github-oauth-client-secret
      secretKey: dex.github.clientSecret
